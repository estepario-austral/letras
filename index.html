<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ESTEPARIO AUSTRAL - Archive Terminal">
    <title>ESTEPARIO AUSTRAL - Archive Terminal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <h1 class="archive-title">ESTEPARIO AUSTRAL</h1>
                <p class="archive-subtitle">ARCHIVE TERMINAL</p>
                <div class="loading-indicator">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>

        <!-- Archive Interface -->
        <div id="archive" class="archive hidden">
            <!-- Header -->
            <header class="archive-header">
                <h1 class="header-title">ESTEPARIO AUSTRAL</h1>
                <p class="header-subtitle">ARCHIVE TERMINAL</p>
            </header>

            <!-- Search -->
            <div class="search-container">
                <input
                    type="text"
                    id="search-input"
                    class="search-input"
                    placeholder="Search archive..."
                    autocomplete="off"
                >
                <div class="search-indicator"></div>
            </div>

            <!-- Archive Files -->
            <main class="archive-files">
                <div id="files-container" class="files-container">
                    <!-- Files will be populated by JavaScript -->
                </div>
                <div id="no-results" class="no-results hidden">
                    <p>No documents found.</p>
                </div>
            </main>

            <!-- Footer -->
            <footer class="archive-footer">
                <p class="footer-text">Archive Terminal v1.0</p>
            </footer>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
